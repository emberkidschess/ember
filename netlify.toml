[build]
  command = "cd frontend && npm install && npm run build"
  publish = "frontend/.next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NEXT_PUBLIC_API_URL = "/api"
  INTERNAL_PORTAL_ENTRY_PATH = "/secure-entry-x7k9p3m2q8"

[[redirects]]
  from = "/api/*"
  to = "https://ember-btx5.onrender.com/api/:splat"
  status = 200
  force = true
